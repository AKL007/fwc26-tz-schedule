name: Sync WC 2026 Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync match data
        run: python3 scripts/sync.py
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Validate data
        run: pip install pytest && python3 -m pytest tests/ -v

      - name: Regenerate static pages
        run: |
          python3 scripts/generate-country-pages.py
          python3 scripts/generate-team-pages.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: update match schedule and pages'
          file_pattern: 'data/matches.json sitemap.xml robots.txt team/ */index.html'
