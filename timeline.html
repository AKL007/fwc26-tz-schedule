<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026 — Timeline</title>
  <meta name="description" content="FIFA World Cup 2026 schedule timeline grid in your local timezone.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="timeline.css">
</head>
<body>
  <nav class="view-nav">
    <a href="index.html">List</a>
    <a href="timeline.html" class="active">Timeline</a>
  </nav>
  <header>
    <h1>FIFA World Cup 2026</h1>
    <p class="subtitle">Timeline View</p>
    <div class="tz-display">
      <span id="tz-label"></span>
      <button id="tz-change" type="button" title="Change timezone">Change</button>
      <select id="tz-select" class="hidden"></select>
    </div>
  </header>

  <div class="timeline-wrapper">
    <div id="timeline-grid" class="timeline-grid"></div>
  </div>

  <div class="timeline-legend" id="timeline-legend"></div>

  <footer>
    <p>Times shown in your local timezone. <span id="last-updated"></span></p>
    <p>Data from <a href="https://www.football-data.org" target="_blank" rel="noopener">football-data.org</a></p>
  </footer>

  <script src="shared.js"></script>
  <script src="timeline.js"></script>
</body>
</html>
